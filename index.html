<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hAPI — Onboarding Checklist</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// SVG icons inline (no lucide dependency)
const Icons = {
  Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  Database: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
  Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
  Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  DatabaseLg: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
};

function App() {
  const STORAGE_KEY = "hapi-onboarding-v2";

  const defaultItems = [
    { id: 1, text: "Contrato assinado, colocado no HubSpot e guardado no Google Drive", category: "Legal", status: "pending" },
    { id: 2, text: "Configuração no BO concluída", category: "Técnico", status: "pending" },
    { id: 3, text: "Documentação Técnica enviada ao cliente", category: "Técnico", status: "pending", optional: true, partialLabel: "Pronta, não enviada" },
    { id: 4, text: "Endpoint de teste configurado (sandbox)", category: "Técnico", status: "pending", optional: true },
    { id: 5, text: "Primeiro processo de teste validado", category: "Técnico", status: "pending" },
    { id: 6, text: "Primeiro processo com dados reais validado", category: "Técnico", status: "pending" },
    { id: 7, text: "Reunião de kickoff realizada", category: "CS", status: "pending" },
    { id: 8, text: "Contacto principal identificado e registado no HubSpot", category: "CS", status: "pending" },
    { id: 9, text: "Health score inicial atribuído", category: "CS", status: "pending" },
    { id: 10, text: "Plano de rollout acordado (fases e datas)", category: "CS", status: "pending" },
    { id: 11, text: "KPIs de sucesso definidos com o cliente", category: "CS", status: "pending" },
    { id: 12, text: "Deal movido para 'Onboarding' no CS Lifecycle", category: "CRM", status: "pending" },
    { id: 13, text: "PostHog tracking configurado para eventos do cliente", category: "Analytics", status: "pending" },
    { id: 14, text: "Dashboard LookerStudio criado/configurado", category: "Analytics", status: "pending" },
    { id: 15, text: "Primeira reunião de follow-up agendada (2 semanas)", category: "CS", status: "pending" },
    { id: 16, text: "Go-live production confirmado", category: "Técnico", status: "pending" },
  ];

  // Client name from URL param: ?client=NomeCliente
  const urlParams = new URLSearchParams(window.location.search);
  const clientName = urlParams.get("client") || "Novo Cliente";

  const loadState = () => {
    try {
      const saved = localStorage.getItem(`${STORAGE_KEY}-${clientName}`);
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    return defaultItems;
  };

  const [items, setItems] = useState(loadState);
  const [newItem, setNewItem] = useState("");
  const [selectedCategory, setSelectedCategory] = useState("All");

  useEffect(() => {
    try { localStorage.setItem(`${STORAGE_KEY}-${clientName}`, JSON.stringify(items)); } catch (e) {}
  }, [items, clientName]);

  const categoryIcons = { "Legal": Icons.Shield, "Técnico": Icons.Database, "CS": Icons.Users, "CRM": Icons.FileText, "Analytics": Icons.Zap };
  const categoryColors = { "Legal": "bg-purple-100 text-purple-700", "Técnico": "bg-blue-100 text-blue-700", "CS": "bg-green-100 text-green-700", "CRM": "bg-orange-100 text-orange-700", "Analytics": "bg-cyan-100 text-cyan-700", "Other": "bg-gray-100 text-gray-700" };
  const categories = ["All", ...new Set(items.map(i => i.category))];

  const cycleStatus = (id) => setItems(items.map(item => {
    if (item.id !== id) return item;
    if (item.partialLabel) {
      const cycle = { pending: "partial", partial: "done", done: "pending" };
      return { ...item, status: cycle[item.status] };
    }
    return { ...item, status: item.status === "pending" ? "done" : "pending" };
  }));

  const deleteItem = (id) => setItems(items.filter(item => item.id !== id));
  const addItem = () => {
    if (newItem.trim()) {
      setItems([...items, { id: Math.max(...items.map(i => i.id), 0) + 1, text: newItem, category: "Other", status: "pending" }]);
      setNewItem("");
    }
  };

  const resetAll = () => { if (window.confirm("Reset all items to pending?")) setItems(defaultItems); };

  const filteredItems = selectedCategory === "All" ? items : items.filter(i => i.category === selectedCategory);
  const completedCount = items.filter(i => i.status === "done" || i.status === "partial").length;
  const totalCount = items.length;
  const progressPercent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;

  const phaseProgress = {};
  categories.filter(c => c !== "All").forEach(cat => {
    const catItems = items.filter(i => i.category === cat);
    phaseProgress[cat] = { done: catItems.filter(i => i.status === "done" || i.status === "partial").length, total: catItems.length };
  });

  const getCheckboxStyle = (s) => s === "done" ? "bg-blue-500 border-blue-500" : s === "partial" ? "bg-amber-400 border-amber-400" : "border-gray-300 hover:border-blue-400";

  return (
    <div className="w-full min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 p-4 md:p-6">
      <div className="max-w-3xl mx-auto">
        {/* Header */}
        <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
          <div className="flex items-center gap-3 mb-1">
            <div className="bg-blue-600 text-white rounded-lg p-2"><Icons.DatabaseLg /></div>
            <div>
              <h1 className="text-xl md:text-2xl font-bold text-gray-800">hAPI — Onboarding Checklist</h1>
              <p className="text-gray-500 text-sm">Cliente: <span className="font-semibold text-blue-600">{clientName}</span></p>
            </div>
          </div>

          {/* Progress bar */}
          <div className="mt-4">
            <div className="flex justify-between text-sm mb-1">
              <span className="text-gray-600">{completedCount}/{totalCount} completos</span>
              <span className="font-bold text-blue-600">{progressPercent}%</span>
            </div>
            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
              <div className="bg-blue-500 h-full transition-all duration-500 rounded-full" style={{ width: `${progressPercent}%` }} />
            </div>
          </div>

          {/* Category cards */}
          <div className="mt-4 grid grid-cols-5 gap-2">
            {Object.entries(phaseProgress).map(([cat, { done, total }]) => {
              const CatIcon = categoryIcons[cat] || Icons.FileText;
              const pct = total > 0 ? Math.round((done / total) * 100) : 0;
              return (
                <div key={cat} className={`rounded-lg p-2 text-center text-xs ${categoryColors[cat]}`}>
                  <CatIcon /><div className="font-bold mt-1">{pct}%</div><div className="opacity-75">{cat}</div>
                </div>
              );
            })}
          </div>

          {/* Legend */}
          <div className="mt-3 flex items-center gap-4 text-xs text-gray-400">
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded bg-blue-500"></span> Concluído</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded bg-amber-400"></span> Parcial</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded border border-gray-300"></span> Pendente</span>
            <button onClick={resetAll} className="ml-auto text-gray-300 hover:text-red-400 text-xs underline">Reset</button>
          </div>
        </div>

        {/* Category filter */}
        <div className="bg-white rounded-xl shadow p-3 mb-4">
          <div className="flex gap-2 flex-wrap">
            {categories.map(cat => (
              <button key={cat} onClick={() => setSelectedCategory(cat)}
                className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${selectedCategory === cat ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700 hover:bg-gray-200"}`}>
                {cat} {cat !== "All" && <span className="opacity-60">({phaseProgress[cat]?.done || 0}/{phaseProgress[cat]?.total || 0})</span>}
              </button>
            ))}
          </div>
        </div>

        {/* Add item */}
        <div className="bg-white rounded-xl shadow p-3 mb-4">
          <div className="flex gap-2">
            <input type="text" value={newItem} onChange={e => setNewItem(e.target.value)} onKeyPress={e => e.key === "Enter" && addItem()}
              placeholder="Adicionar item..." className="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
            <button onClick={addItem} className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-1"><Icons.Plus /> Add</button>
          </div>
        </div>

        {/* Items */}
        <div className="space-y-2">
          {filteredItems.map(item => (
            <div key={item.id} className={`bg-white rounded-lg shadow-sm p-3 flex items-center gap-3 transition-all ${item.status !== "pending" ? "opacity-70" : "hover:shadow-md"}`}>
              <button onClick={() => cycleStatus(item.id)}
                className={`flex-shrink-0 w-6 h-6 rounded border-2 flex items-center justify-center transition-colors ${getCheckboxStyle(item.status)}`}>
                {item.status === "done" && <Icons.Check />}
                {item.status === "partial" && <Icons.Minus />}
              </button>
              <div className="flex-1 min-w-0">
                <p className={`text-sm font-medium ${item.status === "done" ? "text-gray-400 line-through" : item.status === "partial" ? "text-amber-700" : "text-gray-800"}`}>
                  {item.text}
                </p>
                {item.status === "partial" && item.partialLabel && <p className="text-xs text-amber-500 mt-0.5">{item.partialLabel}</p>}
              </div>
              <div className="flex items-center gap-2 flex-shrink-0">
                {item.optional && <span className="text-xs px-2 py-0.5 rounded-full bg-gray-50 text-gray-400 border border-gray-200">opcional</span>}
                <span className={`text-xs px-2 py-1 rounded-full font-medium whitespace-nowrap ${categoryColors[item.category] || "bg-gray-100 text-gray-600"}`}>{item.category}</span>
                <button onClick={() => deleteItem(item.id)} className="text-gray-300 hover:text-red-500 transition-colors"><Icons.Trash /></button>
              </div>
            </div>
          ))}
        </div>

        {filteredItems.length === 0 && (
          <div className="bg-white rounded-xl shadow p-8 text-center text-gray-400">Todos os itens desta categoria estão completos.</div>
        )}

        <div className="mt-8 text-center text-xs text-gray-300">hAPI Client Onboarding • {new Date().getFullYear()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
